<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0d14"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6a00"/>
      <stop offset="50%" stop-color="#ffb300"/>
      <stop offset="100%" stop-color="#ff6a00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="28" fill="url(#bg)"/>

  <!-- Outer cyan border -->
  <rect x="6" y="6" width="180" height="180" rx="23" fill="none" stroke="rgba(0,210,255,0.5)" stroke-width="2"/>

  <!-- Corner brackets -->
  <path d="M16 30 L16 16 L30 16" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M162 16 L176 16 L176 30" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M16 162 L16 176 L30 176" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>
  <path d="M176 162 L176 176 L162 176" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round"/>

  <!-- Crosshair in center -->
  <circle cx="96" cy="82" r="22" fill="none" stroke="rgba(0,210,255,0.3)" stroke-width="1.5"/>
  <circle cx="96" cy="82" r="14" fill="none" stroke="rgba(0,210,255,0.5)" stroke-width="1"/>
  <circle cx="96" cy="82" r="4" fill="#00d2ff" filter="url(#cglow)"/>
  <!-- Crosshair lines -->
  <line x1="96" y1="56" x2="96" y2="68" stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="96" y1="96" x2="96" y2="108" stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="70" y1="82" x2="82" y2="82" stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="110" y1="82" x2="122" y2="82" stroke="#00d2ff" stroke-width="1.5" stroke-linecap="round"/>

  <!-- "10" big text -->
  <text x="96" y="124" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="28" fill="url(#orange)" text-anchor="middle" filter="url(#glow)" letter-spacing="2">10</text>

  <!-- "SQUAD" text -->
  <text x="96" y="144" font-family="Arial Black, Impact, sans-serif" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="3" opacity="0.9">SQUAD</text>

  <!-- Bottom accent line -->
  <line x1="48" y1="158" x2="144" y2="158" stroke="url(#orange)" stroke-width="1.5" opacity="0.7"/>

  <!-- "ASSASSIN" small text -->
  <text x="96" y="172" font-family="monospace" font-size="9" fill="rgba(255,179,0,0.7)" text-anchor="middle" letter-spacing="2">ASSASSIN</text>
</svg>
